name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this pull request for:
            1. Code quality - Clean, readable, maintainable code
            2. Dual-context correctness - Ensure Design OS UI changes don't leak into product export styling and vice versa
            3. Component conventions - Verify data-slot attributes, CVA variant patterns, and Radix UI/shadcn usage
            4. Markdown spec integrity - Changes to /product/*.md must follow exact format required by loaders
            5. Potential bugs - Logic errors, edge cases, null checks
            6. Security issues - XSS, injection, exposed secrets, unsafe patterns
            7. Project conventions - Check CLAUDE.md for project-specific conventions

            Be concise and actionable. Focus on issues that matter, not style nitpicks.
            If the PR looks good, say so briefly.
          claude_args: >-
            --max-turns 10
            --allowedTools "Read,Glob,Grep,LS"
